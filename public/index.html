<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LP GAP</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0e13; --card: #16171e; --card2: #1c1d26;
      --border: #2a2b35; --text: #e8e8e8; --dim: #6b6d7b;
      --faint: #3a3b47; --green: #49b26c; --red: #e85d75;
      --gold: #f0b232; --magenta: #d946ef; --cyan: #22d3ee;
      --input-bg: #1c1d26;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px 80px;
    }

    /* Header */
    .header {
      text-align: center; margin-bottom: 40px;
      position: relative;
    }
    .header h1 {
      font-size: clamp(32px, 8vw, 56px); font-weight: 900;
      letter-spacing: .12em; text-transform: uppercase;
      background: linear-gradient(135deg, #fff 30%, var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .sub {
      font-size: 12px; color: var(--dim); letter-spacing: .3em;
      text-transform: uppercase; margin-top: 6px;
    }

    /* Form */
    .form {
      width: 100%; max-width: 560px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; margin-bottom: 24px;
    }
    .field { margin-bottom: 16px; }
    .field:last-of-type { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 11px; font-weight: 600;
      letter-spacing: .15em; color: var(--dim);
      text-transform: uppercase; margin-bottom: 8px;
    }
    input {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-family: inherit; font-size: 14px; font-weight: 500;
      outline: none; transition: border-color .2s;
    }
    input::placeholder { color: var(--faint); }
    input:focus { border-color: var(--gold); }

    .regions {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px;
    }
    .regions button {
      background: var(--bg); color: var(--dim); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 14px; font-size: 12px;
      font-family: inherit; font-weight: 600; cursor: pointer;
      transition: all .15s;
    }
    .regions button.active {
      background: var(--gold); color: #000; border-color: var(--gold);
    }
    .regions button:hover:not(.active) { border-color: var(--dim); color: var(--text); }

    .compare-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold), #e09400);
      color: #000; border: none; border-radius: 10px;
      font-size: 13px; font-family: inherit; font-weight: 700;
      letter-spacing: .15em; text-transform: uppercase;
      cursor: pointer; transition: all .2s;
    }
    .compare-btn:disabled { opacity: .3; cursor: not-allowed; filter: grayscale(1); }
    .compare-btn:not(:disabled):hover { filter: brightness(1.1); transform: translateY(-1px); }

    /* Loading */
    .loading {
      text-align: center; margin-top: 32px; color: var(--dim);
      font-size: 12px; font-weight: 600; letter-spacing: .2em; text-transform: uppercase;
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 16px;
    }

    /* Results */
    .results {
      width: 100%; max-width: 560px;
      animation: fadeUp .5s ease;
    }

    /* Gap card */
    .gap-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; text-align: center;
      margin-bottom: 12px; position: relative; overflow: hidden;
    }
    .gap-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--magenta), var(--gold));
    }
    .gap-card .label {
      font-size: 11px; font-weight: 600; letter-spacing: .25em;
      color: var(--dim); text-transform: uppercase; margin-bottom: 8px;
    }
    .gap-card .value {
      font-size: clamp(40px, 10vw, 64px); font-weight: 900;
      color: var(--gold); line-height: 1;
    }
    .gap-card .leader {
      font-size: 12px; color: var(--dim); margin-top: 12px;
      letter-spacing: .1em;
    }
    .gap-card .leader strong { color: var(--text); font-weight: 700; }

    /* Player card */
    .player-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; margin-bottom: 12px;
    }
    .player-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .player-name-section { display: flex; align-items: center; gap: 12px; }
    .player-avatar {
      width: 44px; height: 44px; border-radius: 10px;
      flex-shrink: 0; overflow: hidden;
      border: 2px solid var(--border);
    }
    .player-avatar img {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .player-name {
      font-size: 16px; font-weight: 700; letter-spacing: .02em;
    }
    .player-tag { color: var(--dim); font-weight: 500; }
    .player-rank-badge {
      font-size: 13px; font-weight: 800; padding: 6px 14px;
      border-radius: 8px; letter-spacing: .05em;
    }

    /* Stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px;
      background: var(--border); border-radius: 12px; overflow: hidden;
      margin-bottom: 20px;
    }
    .stat {
      background: var(--card2); padding: 16px 12px; text-align: center;
    }
    .stat-value {
      font-size: 20px; font-weight: 800; line-height: 1; margin-bottom: 4px;
    }
    .stat-label {
      font-size: 9px; font-weight: 600; color: var(--dim);
      text-transform: uppercase; letter-spacing: .15em;
    }

    /* LP Progress bar */
    .lp-progress {
      background: var(--bg); border-radius: 10px; padding: 16px 20px;
    }
    .lp-progress-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .lp-progress-title {
      font-size: 11px; font-weight: 600; color: var(--dim);
      letter-spacing: .1em; text-transform: uppercase;
    }
    .lp-progress-value {
      font-size: 14px; font-weight: 800; color: var(--gold);
    }
    .lp-track {
      width: 100%; height: 8px; background: var(--border);
      border-radius: 4px; position: relative; overflow: hidden;
    }
    .lp-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--magenta), #a855f7);
      transition: width 1s cubic-bezier(.16,1,.3,1);
    }
    .lp-markers {
      display: flex; justify-content: space-between; margin-top: 8px;
    }
    .lp-marker {
      font-size: 9px; font-weight: 600; color: var(--faint);
      letter-spacing: .05em;
    }

    .error {
      color: var(--red); font-size: 13px; text-align: center;
      margin-top: 16px; font-weight: 500;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .player-top { flex-direction: column; align-items: flex-start; gap: 12px; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>LP GAP</h1>
    <div class="sub">League Points Comparator</div>
  </div>

  <div class="form">
    <div class="field">
      <label>Jugador 1</label>
      <input id="p1" placeholder="Nombre#Tag" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field">
      <label>Jugador 2</label>
      <input id="p2" placeholder="Nombre#Tag" autocomplete="off" spellcheck="false" />
    </div>
    <div class="field">
      <label>Región</label>
      <div class="regions" id="regions"></div>
    </div>
    <button class="compare-btn" id="btn" disabled>Comparar</button>
  </div>

  <div id="error" class="error" hidden></div>
  <div id="loading" class="loading" hidden>
    <div class="spinner"></div>
    <span id="load-msg">Buscando invocadores...</span>
  </div>
  <div id="results" class="results" hidden></div>

<script>
const REGIONS = [
  {v:"euw",l:"EUW"},{v:"eune",l:"EUNE"},{v:"na",l:"NA"},{v:"kr",l:"KR"},
  {v:"jp",l:"JP"},{v:"br",l:"BR"},{v:"las",l:"LAS"},{v:"lan",l:"LAN"},
  {v:"oce",l:"OCE"},{v:"tr",l:"TR"}
];
const TIERS = ["IRON","BRONZE","SILVER","GOLD","PLATINUM","EMERALD","DIAMOND","MASTER","GRANDMASTER","CHALLENGER"];
const DIVS  = ["IV","III","II","I"];
const TIER_COLORS = {
  IRON:      { bg:"#8B8589", text:"#fff" },
  BRONZE:    { bg:"#CD7F32", text:"#fff" },
  SILVER:    { bg:"#9ca3af", text:"#000" },
  GOLD:      { bg:"#f0b232", text:"#000" },
  PLATINUM:  { bg:"#47C9AF", text:"#000" },
  EMERALD:   { bg:"#50C878", text:"#000" },
  DIAMOND:   { bg:"#B9F2FF", text:"#000" },
  MASTER:    { bg:"#9B59B6", text:"#fff" },
  GRANDMASTER:{ bg:"#E74C3C", text:"#fff" },
  CHALLENGER:{ bg:"#F1C40F", text:"#000" },
  UNRANKED:  { bg:"#3a3b47", text:"#fff" },
};

let region = "euw";
let ddragonVersion = "15.7.1"; // fallback
const $p1 = document.getElementById("p1");
const $p2 = document.getElementById("p2");
const $btn = document.getElementById("btn");

// Fetch latest ddragon version
fetch("https://ddragon.leagueoflegends.com/api/versions.json")
  .then(r => r.json())
  .then(v => { if (v && v[0]) ddragonVersion = v[0]; })
  .catch(() => {});

function iconUrl(id) {
  return `https://ddragon.leagueoflegends.com/cdn/${ddragonVersion}/img/profileicon/${id}.png`;
}

// Regions
const $reg = document.getElementById("regions");
REGIONS.forEach(r => {
  const b = document.createElement("button");
  b.textContent = r.l;
  if (r.v === region) b.className = "active";
  b.onclick = () => {
    region = r.v;
    $reg.querySelectorAll("button").forEach(x => x.className = "");
    b.className = "active";
  };
  $reg.appendChild(b);
});

function check() { $btn.disabled = !($p1.value.includes("#") && $p2.value.includes("#")); }
$p1.addEventListener("input", check);
$p2.addEventListener("input", check);
[$p1,$p2].forEach(el => el.addEventListener("keydown", e => {
  if (e.key === "Enter" && !$btn.disabled) compare();
}));
$btn.addEventListener("click", compare);

function toLP(tier, div, lp) {
  const i = TIERS.indexOf((tier||"").toUpperCase());
  if (i < 0) return 0;
  if (i >= 7) return 2800 + (lp||0);
  const d = DIVS.indexOf((div||"").toUpperCase());
  return i*400 + Math.max(d,0)*100 + (lp||0);
}

function fmtRank(r) {
  if (!r || r.tier === "Unranked") return "UNRANKED";
  const t = r.tier.toUpperCase();
  if (TIERS.indexOf(t) >= 7) return `${r.tier} ${r.lp} LP`;
  return `${r.tier} ${r.division}`;
}

function tierKey(r) {
  return (r && r.tier !== "Unranked") ? r.tier.toUpperCase() : "UNRANKED";
}

// Progress bar logic
function getProgressInfo(r) {
  if (!r || r.tier === "Unranked") return { label: "UNRANKED", pct: 0, left: "—", right: "—", valueTxt: "0 LP" };
  const t = r.tier.toUpperCase();
  const idx = TIERS.indexOf(t);

  if (idx >= 7) {
    // Master+ : show progress toward next tier or within tier
    const lpInTier = r.lp;
    if (idx === 7) { // Master
      return { label: "MASTER → CHALLENGER", pct: Math.min((lpInTier/1600)*100, 100),
        left: "M 0 LP", right: "C", valueTxt: `${lpInTier} LP` };
    }
    if (idx === 8) { // GM
      return { label: "GRANDMASTER", pct: Math.min((lpInTier/1800)*100, 100),
        left: "GM 0 LP", right: "C", valueTxt: `${lpInTier} LP` };
    }
    return { label: "CHALLENGER", pct: 100,
      left: "C", right: `${lpInTier} LP`, valueTxt: `${lpInTier} LP` };
  }

  // Normal tiers: progress through division (0-100 LP)
  const divIdx = DIVS.indexOf((r.division||"").toUpperCase());
  const divLabel = r.division || "IV";
  const nextDiv = divIdx < 3 ? DIVS[divIdx+1] : (idx < 6 ? TIERS[idx+1].charAt(0)+TIERS[idx+1].slice(1).toLowerCase()+" IV" : "Master");
  const pct = Math.min(r.lp, 100);
  return {
    label: `${r.tier} ${divLabel}`,
    pct: pct,
    left: "0 LP",
    right: divIdx < 3 ? `${r.tier} ${DIVS[divIdx+1]}` : (idx < 9 ? TIERS[idx+1].charAt(0)+TIERS[idx+1].slice(1).toLowerCase() : "—"),
    valueTxt: `${r.lp} LP`
  };
}

function esc(s) { const d=document.createElement("div"); d.textContent=s; return d.innerHTML; }

async function fetchRank(name, tag) {
  const res = await fetch(`/api/rank?name=${encodeURIComponent(name)}&tag=${encodeURIComponent(tag)}&region=${region}`);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || "Error");
  return data;
}

const MSGS = ["Buscando invocadores...", "Consultando rangos...", "Calculando gap..."];
let loadIv;
function setLoading(on) {
  document.getElementById("loading").hidden = !on;
  clearInterval(loadIv);
  if (on) {
    $btn.disabled = true;
    let i = 0;
    loadIv = setInterval(() => {
      i = (i+1)%MSGS.length;
      document.getElementById("load-msg").textContent = MSGS[i];
    }, 1500);
  } else check();
}
function showError(msg) { const e=document.getElementById("error"); e.textContent=msg; e.hidden=false; }
function hideError() { document.getElementById("error").hidden=true; }

function buildPlayerCard(riotId, r) {
  const parts = riotId.split("#");
  const name = esc(parts[0]);
  const tag = esc(parts[1] || "");
  const tk = tierKey(r);
  const tc = TIER_COLORS[tk] || TIER_COLORS.UNRANKED;
  const total = r.wins + r.losses;
  const wrPct = total ? Math.round((r.wins/total)*100) : 0;
  const wrColor = wrPct >= 55 ? "var(--green)" : wrPct >= 50 ? "var(--text)" : "var(--red)";
  const prog = getProgressInfo(r);
  const icon = r.iconId || 29;

  return `
    <div class="player-card">
      <div class="player-top">
        <div class="player-name-section">
          <div class="player-avatar" style="border-color:${tc.bg}">
            <img src="${iconUrl(icon)}" alt="${name}" />
          </div>
          <div>
            <div class="player-name">${name}<span class="player-tag"> #${tag}</span></div>
          </div>
        </div>
        <div class="player-rank-badge" style="background:${tc.bg};color:${tc.text}">
          ${fmtRank(r)}
        </div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Partidas</div>
        </div>
        <div class="stat">
          <div class="stat-value" style="color:${wrColor}">${wrPct}%</div>
          <div class="stat-label">Win Rate</div>
        </div>
        <div class="stat">
          <div class="stat-value" style="color:var(--green)">${r.wins}</div>
          <div class="stat-label">Wins</div>
        </div>
        <div class="stat">
          <div class="stat-value" style="color:var(--red)">${r.losses}</div>
          <div class="stat-label">Losses</div>
        </div>
      </div>

      <div class="lp-progress">
        <div class="lp-progress-header">
          <span class="lp-progress-title">${prog.label}</span>
          <span class="lp-progress-value">${prog.valueTxt}</span>
        </div>
        <div class="lp-track">
          <div class="lp-fill" style="width:0%" data-target="${prog.pct}"></div>
        </div>
        <div class="lp-markers">
          <span class="lp-marker">${prog.left}</span>
          <span class="lp-marker">${prog.right}</span>
        </div>
      </div>
    </div>`;
}

async function compare() {
  const id1 = $p1.value.trim().split("#");
  const id2 = $p2.value.trim().split("#");
  if (id1.length!==2 || id2.length!==2) return showError("Formato: Nombre#Tag");

  hideError();
  document.getElementById("results").hidden = true;
  setLoading(true);

  try {
    const [r1, r2] = await Promise.all([
      fetchRank(id1[0], id1[1]),
      fetchRank(id2[0], id2[1])
    ]);

    const lp1 = toLP(r1.tier, r1.division, r1.lp);
    const lp2 = toLP(r2.tier, r2.division, r2.lp);
    const diff = Math.abs(lp1 - lp2);
    const leader = lp1 >= lp2 ? 1 : 2;
    const leaderName = leader===1 ? esc($p1.value.trim().split("#")[0]) : esc($p2.value.trim().split("#")[0]);

    const box = document.getElementById("results");
    box.innerHTML = `
      <div class="gap-card">
        <div class="label">LP Gap</div>
        <div class="value">${diff === 0 ? '0' : '+'+diff}</div>
        <div class="leader">${diff === 0
          ? 'Mismo rango'
          : `<strong>${leaderName}</strong> va por delante`
        }</div>
      </div>
      ${buildPlayerCard($p1.value.trim(), r1)}
      ${buildPlayerCard($p2.value.trim(), r2)}
    `;
    box.hidden = false;

    // Animate progress bars
    requestAnimationFrame(() => {
      setTimeout(() => {
        box.querySelectorAll('.lp-fill').forEach(bar => {
          bar.style.width = bar.dataset.target + '%';
        });
      }, 80);
    });

  } catch(e) {
    showError(e.message || "Error al buscar datos");
  }
  setLoading(false);
}
</script>
</body>
</html>
